<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TierList by Fushyki</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="tierlist-container">
      <h1>Minha Lista de Personagens</h1>

      <div class="controls">
        <button onclick="resetarTierList()" class="reset-btn">
          Resetar Tudo
        </button>

        <div class="column-buttons">
          <span>Colunas:</span>
          <button onclick="mudarColunas(1)">1</button>
          <button onclick="mudarColunas(2)">2</button>
          <button onclick="mudarColunas(3)">3</button>
        </div>

        <button onclick="adicionarLinha()" class="add-row-btn">
          + Adicionar Linha
        </button>

        <div class="dica-texto">
          Dica: Segure <strong>ALT + Clique Esquerdo</strong> na imagem para
          duplicar
        </div>
      </div>

      <div class="controls" style="margin-top: 30px">
        <button onclick="salvarComoImagem()">Salvar como Imagem</button>
      </div>
      <div id="board"></div>

      <div class="inventory-section">
        <div class="inventory-header">
          <label for="image-input" class="custom-upload-btn">
            ＋ Adicionar Imagens
          </label>
          <input
            type="file"
            id="image-input"
            multiple
            accept="image/*"
            style="display: none" />

          <div class="sort-controls">
            <span class="sort-label">Ordenar:</span>
            <button
              onclick="ordenarInventario('nome-az')"
              id="sort-nome-az"
              class="sort-btn active">
              Nome A→Z
            </button>
            <button
              onclick="ordenarInventario('nome-za')"
              id="sort-nome-za"
              class="sort-btn">
              Nome Z→A
            </button>
            <button
              onclick="ordenarInventario('upload')"
              id="sort-upload"
              class="sort-btn">
              Upload
            </button>
          </div>

          <div class="inventory-actions">
            <span id="contador-imagens" class="contador-texto"
              >0 imagens no inventário</span
            >
            <button
              onclick="limparInventario()"
              class="clear-inventory-btn"
              title="Remover todas as imagens do inventário">
              🗑️ Limpar
            </button>
          </div>
        </div>

        <span
          id="status-carregamento"
          class="contador-texto"
          style="display: block; margin-bottom: 8px"></span>
        <div id="image-storage" class="storage-box"></div>
      </div>
    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
